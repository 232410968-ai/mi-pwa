<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi PWA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <h1>🚀 Mi PWA funciona</h1>
  <p>Ya puedo instalar esta app</p>
  
<input type="text" id="texto" placeholder="Escribe algo">
<button onclick="guardar()">Guardar</button>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registrado'));
    }
  </script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA2gJuQmO0RJasBtXUfr_lg9Li24dB5JRs",
    authDomain: "apppwa-c083e.firebaseapp.com",
    databaseURL: "https://apppwa-c083e-default-rtdb.firebaseio.com",
    projectId: "apppwa-c083e",
    storageBucket: "apppwa-c083e.firebasestorage.app",
    messagingSenderId: "730674907408",
    appId: "1:730674907408:web:6d7de3f8f2e0d3743e7d95",
    measurementId: "G-Z7NZX0CXCQ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  function guardar() {
    const texto = document.getElementById("texto").value;
    push(ref(db, "datos"), {
      mensaje: texto
    });
    alert("Guardado en Firebase 🔥");
  }

  window.guardar = guardar;
</script>
</body>
</html>
